name: Purge Workflows

on:
  workflow_dispatch:
    inputs:
      days-to-keep:
        description: "Keep logs newer than this days back"
        default: "30"
        required: false

jobs:
  purge-workflows:
    runs-on: ubuntu-latest
    steps:
      - uses: irkode/purge-workflows@main
        with:
          days-to-keep: ${{ github.event.inputs.keep }}
